    - lib/assets/avatar/11.jpg
    - lib/assets/avatar/12.jpg
    - lib/assets/avatar/20.jpg
    - lib/assets/avatar/21.jpg
    - lib/assets/avatar/22.jpg
    - lib/assets/avatar/30.jpg
    - lib/assets/avatar/31.jpg
    - lib/assets/avatar/32.jpg
    - lib/assets/avatar/40.jpg
    - lib/assets/avatar/41.jpg
    - lib/assets/avatar/42.jpg
    - lib/assets/avatar/50.jpg
    - lib/assets/avatar/51.jpg
    - lib/assets/avatar/52.jpg
    - lib/assets/avatar/60.jpg
    - lib/assets/avatar/61.jpg
    - lib/assets/avatar/62.jpg


flutter_icons:
